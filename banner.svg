<svg viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0a1f"/>
      <stop offset="55%" stop-color="#181335"/>
      <stop offset="100%" stop-color="#241a44"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4ecff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#b9a6ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#b9a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ee8fa" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7ee8fa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f7cff"/>
      <stop offset="100%" stop-color="#4fd6e0"/>
    </linearGradient>
    <linearGradient id="buildingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1638"/>
      <stop offset="100%" stop-color="#100c22"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="380" fill="url(#sky)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="60" cy="40" r="1.6" opacity="0.9"/>
    <circle cx="140" cy="90" r="1.1" opacity="0.6"/>
    <circle cx="230" cy="35" r="1.4" opacity="0.8"/>
    <circle cx="310" cy="70" r="1" opacity="0.5"/>
    <circle cx="400" cy="30" r="1.3" opacity="0.7"/>
    <circle cx="470" cy="60" r="1.1" opacity="0.6"/>
    <circle cx="560" cy="25" r="1.5" opacity="0.85"/>
    <circle cx="650" cy="55" r="1" opacity="0.5"/>
    <circle cx="90" cy="140" r="1.2" opacity="0.6"/>
    <circle cx="200" cy="150" r="1" opacity="0.5"/>
    <circle cx="340" cy="120" r="1.3" opacity="0.7"/>
    <circle cx="980" cy="45" r="1.4" opacity="0.8"/>
    <circle cx="1050" cy="90" r="1.1" opacity="0.6"/>
    <circle cx="1120" cy="40" r="1.3" opacity="0.75"/>
    <circle cx="850" cy="30" r="1.2" opacity="0.65"/>
    <circle cx="760" cy="65" r="1" opacity="0.5"/>
    <circle cx="1170" cy="110" r="1.2" opacity="0.6"/>
    <circle cx="700" cy="100" r="1" opacity="0.5"/>
    <circle cx="30" cy="200" r="1.1" opacity="0.55"/>
    <circle cx="1150" cy="180" r="1" opacity="0.5"/>
  </g>

  <!-- shooting star -->
  <line x1="880" y1="60" x2="940" y2="80" stroke="#ffffff" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>

  <!-- moon -->
  <circle cx="1030" cy="80" r="90" fill="url(#moonGlow)"/>
  <path d="M 1005 40 A 45 45 0 1 0 1005 130 A 36 36 0 1 1 1005 40 Z" fill="#f6f1ff"/>

  <!-- distant skyline -->
  <g fill="url(#buildingGrad)">
    <rect x="0" y="270" width="60" height="110"/>
    <rect x="70" y="240" width="45" height="140"/>
    <rect x="125" y="290" width="55" height="90"/>
    <rect x="1040" y="255" width="50" height="125"/>
    <rect x="1095" y="290" width="60" height="90"/>
    <rect x="1000" y="300" width="35" height="80"/>
  </g>
  <g fill="#ffd89b" opacity="0.5">
    <rect x="15" y="290" width="6" height="8"/>
    <rect x="30" y="310" width="6" height="8"/>
    <rect x="85" y="260" width="6" height="8"/>
    <rect x="1055" y="275" width="6" height="8"/>
    <rect x="1110" y="305" width="6" height="8"/>
  </g>

  <!-- desk -->
  <rect x="430" y="300" width="340" height="14" rx="3" fill="#2a2350"/>
  <rect x="460" y="314" width="14" height="55" fill="#221c40"/>
  <rect x="726" y="314" width="14" height="55" fill="#221c40"/>

  <!-- screen glow -->
  <ellipse cx="600" cy="255" rx="150" ry="120" fill="url(#screenGlow)"/>

  <!-- laptop -->
  <g>
    <rect x="545" y="215" width="110" height="72" rx="6" fill="#151030"/>
    <rect x="553" y="222" width="94" height="58" rx="3" fill="url(#screen)"/>
    <path d="M 520 300 L 680 300 L 660 315 L 540 315 Z" fill="#1d1740"/>
  </g>

  <!-- code lines on screen -->
  <g stroke="#0b0a1f" stroke-width="2.2" stroke-linecap="round" opacity="0.55">
    <line x1="562" y1="233" x2="600" y2="233"/>
    <line x1="562" y1="242" x2="625" y2="242"/>
    <line x1="562" y1="251" x2="590" y2="251"/>
    <line x1="562" y1="260" x2="615" y2="260"/>
    <line x1="562" y1="269" x2="580" y2="269"/>
  </g>

  <!-- person silhouette sitting -->
  <g fill="#120e28">
    <ellipse cx="480" cy="270" rx="14" ry="15"/>
    <path d="M 460 285 Q 480 275 505 288 L 512 320 L 452 320 Z"/>
    <path d="M 505 292 Q 535 300 545 275" stroke="#120e28" stroke-width="9" fill="none" stroke-linecap="round"/>
  </g>

  <!-- coffee cup -->
  <g>
    <rect x="695" y="290" width="22" height="20" rx="3" fill="#1d1740"/>
    <path d="M 717 293 q 10 2 0 12" stroke="#1d1740" stroke-width="3" fill="none"/>
    <path d="M 700 283 q 2 -6 -1 -10" stroke="#cbb8ff" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 708 283 q 2 -6 -1 -10" stroke="#cbb8ff" stroke-width="1.5" fill="none" opacity="0.5"/>
  </g>

  <!-- floating code symbols -->
  <g fill="#a78bfa" opacity="0.8" font-family="Fira Code, monospace" font-size="20">
    <text x="330" y="200">&lt;/&gt;</text>
    <text x="820" y="180" font-size="16">{ }</text>
    <text x="870" y="240" font-size="18">;</text>
    <text x="300" y="260" font-size="16">01</text>
  </g>

  <!-- sparkles -->
  <g fill="#e9d8ff">
    <circle cx="360" cy="150" r="2"/>
    <circle cx="900" cy="150" r="1.6"/>
    <circle cx="380" cy="230" r="1.5"/>
  </g>

  <!-- title text -->
  <text x="600" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#f3edff" letter-spacing="1">Jaiwanthini</text>
</svg>
